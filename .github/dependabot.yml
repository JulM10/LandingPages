version: 2
updates:
  # NPM Package Updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "JulM10"
    assignees:
      - "JulM10"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "automated"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignore major version updates for critical dependencies
      # Review manually
      - dependency-name: "next"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions Updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "JulM10"
    assignees:
      - "JulM10"
    commit-message:
      prefix: "ci(actions):"
      include: "scope"
    labels:
      - "ci"
      - "automated"
